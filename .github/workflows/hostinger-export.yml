name: Hostinger Static Export

on:
  workflow_dispatch:

jobs:
  build-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build (Next export)
        run: npm run build

      - name: Ensure out exists
        run: |
          if [ ! -d "out" ]; then
            echo "ERROR: No se generó la carpeta out/. Revisa next.config.mjs y scripts."
            exit 1
          fi

      - name: Zip out folder
        run: |
          cd out
          zip -r ../hostinger-out.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostinger-out
          path: hostinger-out.zip
