    <filter id="shadow" x="80" y="120" width="1440" height="540" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1600" height="720" rx="28" fill="url(#bg)"/>
