    <text x="145" y="275" fill="#FFCDCD" font-family="Rajdhani, Arial" font-size="34">3 turnos + supervisión + rotación</text>

    <text x="885" y="220" fill="#F2F3F7" font-family="Orbitron, Rajdhani, Arial" font-size="40" font-weight="700">WaCRM</text>
    <text x="885" y="275" fill="#BFFFE2" font-family="Rajdhani, Arial" font-size="34">$47,77/mes + soporte 24/7</text>

